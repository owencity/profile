<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" fill="none">
  <defs>
    <linearGradient id="bg" x1="16" y1="12" x2="86" y2="92" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5" stop-opacity="0.18" />
      <stop offset="1" stop-color="#FFF7E6" stop-opacity="0.95" />
    </linearGradient>
    <linearGradient id="pinFill" x1="36" y1="22" x2="62" y2="66" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7E6" />
      <stop offset="1" stop-color="#FDE7B7" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#111827" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- App icon card -->
  <rect x="8" y="8" width="80" height="80" rx="24" fill="url(#bg)" />
  <rect x="8.75" y="8.75" width="78.5" height="78.5" rx="23.25" stroke="#E4E4E7" stroke-width="1.5"/>

  <!-- tiny stars -->
  <g opacity="0.9">
    <path d="M67.5 26.5l1.3 2.9 2.9 1.3-2.9 1.3-1.3 2.9-1.3-2.9-2.9-1.3 2.9-1.3 1.3-2.9Z" fill="#4F46E5" fill-opacity="0.55"/>
    <path d="M74.5 31.2l0.9 2.0 2.0 0.9-2.0 0.9-0.9 2.0-0.9-2.0-2.0-0.9 2.0-0.9 0.9-2.0Z" fill="#FDE7B7" fill-opacity="0.95"/>
    <circle cx="72.8" cy="24.8" r="1.2" fill="#111827" fill-opacity="0.18"/>
  </g>

  <!-- moon -->
  <path d="M70.8 22.2c-5.0 1.4-8.0 6.6-6.6 11.6 1.0 3.7 4.0 6.3 7.6 6.9-5.9 2.1-12.4-1.1-14.5-7.0-2.1-5.9 1.1-12.4 7.0-14.5 2.2-0.8 4.5-0.9 6.5-0.2Z" fill="#FDE7B7" stroke="#4F46E5" stroke-opacity="0.55" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- Pin + cup -->
  <g filter="url(#softShadow)">
    <!-- pin body -->
    <path d="M48 22C38.4 22 30.6 29.8 30.6 39.4c0 12.8 17.4 31.7 17.4 31.7S65.4 52.2 65.4 39.4C65.4 29.8 57.6 22 48 22Z" fill="url(#pinFill)" />
    <path d="M48 24.2c-8.4 0-15.2 6.8-15.2 15.2 0 11.2 15.2 27.9 15.2 27.9s15.2-16.7 15.2-27.9c0-8.4-6.8-15.2-15.2-15.2Z" stroke="#111827" stroke-opacity="0.86" stroke-width="2.2" stroke-linejoin="round"/>

    <!-- cup -->
    <g transform="translate(46 33)">
      <!-- lid -->
      <path d="M-4.5 3.6c0-1.2 1.0-2.2 2.2-2.2h15.2c1.2 0 2.2 1.0 2.2 2.2v1.5c0 0.8-0.6 1.4-1.4 1.4H-3.1c-0.8 0-1.4-0.6-1.4-1.4V3.6Z" fill="#FFF7E6" stroke="#111827" stroke-opacity="0.86" stroke-width="2" />
      <!-- cup body -->
      <path d="M-2.8 8.8h13.6l-1.7 21.4c-0.1 1.5-1.4 2.7-2.9 2.7H0.6c-1.5 0-2.8-1.2-2.9-2.7L-2.8 8.8Z" fill="#FFF7E6" stroke="#111827" stroke-opacity="0.86" stroke-width="2" stroke-linejoin="round"/>
      <!-- sleeve -->
      <path d="M-1.4 17.0c0-1.0 0.8-1.8 1.8-1.8H8.9c1.0 0 1.8 0.8 1.8 1.8v6.1c0 1.0-0.8 1.8-1.8 1.8H0.4c-1.0 0-1.8-0.8-1.8-1.8V17.0Z" fill="#FDE7B7" stroke="#111827" stroke-opacity="0.86" stroke-width="1.6"/>
      <text x="4.65" y="22.25" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="7.6" font-weight="800" fill="#111827" fill-opacity="0.9">24H</text>
    </g>
  </g>
</svg>

